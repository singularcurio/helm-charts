{{- if not .Values.opnsense.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "opnsense-ingress-operator.fullname" . }}
  labels:
    {{- include "opnsense-ingress-operator.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPNSENSE_HOST: {{ required "opnsense.host is required" .Values.opnsense.host | quote }}
  OPNSENSE_API_KEY: {{ required "opnsense.apiKey is required" .Values.opnsense.apiKey | quote }}
  OPNSENSE_API_SECRET: {{ required "opnsense.apiSecret is required" .Values.opnsense.apiSecret | quote }}
{{- end }}
