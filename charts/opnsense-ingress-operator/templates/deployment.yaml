apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opnsense-ingress-operator.fullname" . }}
  labels:
    {{- include "opnsense-ingress-operator.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "opnsense-ingress-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "opnsense-ingress-operator.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "opnsense-ingress-operator.serviceAccountName" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: OPNSENSE_VERIFY_SSL
              value: {{ .Values.opnsense.verifySSL | quote }}
            - name: OPNSENSE_DEFAULT_TTL
              value: {{ .Values.operator.defaultTTL | quote }}
            - name: OPNSENSE_ANNOTATION_PREFIX
              value: {{ .Values.operator.annotationPrefix | quote }}
            - name: OPNSENSE_DESCRIPTION_PREFIX
              value: {{ .Values.operator.descriptionPrefix | quote }}
            - name: OPNSENSE_RECONCILE_INTERVAL
              value: {{ .Values.operator.reconcileInterval | quote }}
            - name: OPNSENSE_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "opnsense-ingress-operator.secretName" . }}
                  key: OPNSENSE_HOST
            - name: OPNSENSE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "opnsense-ingress-operator.secretName" . }}
                  key: OPNSENSE_API_KEY
            - name: OPNSENSE_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "opnsense-ingress-operator.secretName" . }}
                  key: OPNSENSE_API_SECRET
          # kopf exposes a health endpoint on port 8080 by default
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
